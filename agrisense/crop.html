<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Crop Selection</title>
<!-- Include LanguageConfig first -->
<script src="js/language-config.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="crop.css">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="feature-shell.css">
</head>

<body>
<div class="overlay"></div>

<div id="language-selector-container"></div>

<!-- Include the new language selector script -->
<script src="js/language-selector.js"></script>

<!-- 🔙 Back button -->
<a href="dashboard.html" class="back-btn" id="backBtn" data-i18n="crop.back">← Back</a>

<div class="container">
  <h1 id="heading" data-i18n="crop.heading">🌱 फसल चयन</h1>
  <p id="sub" data-i18n="crop.sub">खेती की जानकारी भरें</p>

  <div class="card">
    <label id="soilL" data-i18n="crop.soilL">🌍 मिट्टी का प्रकार</label>
    <select id="soil"></select>

    <label id="seasonL" data-i18n="crop.seasonL">🌦 मौसम</label>
    <select id="season"></select>

    <label id="waterL" data-i18n="crop.waterL">💧 पानी उपलब्धता</label>
    <select id="water"></select>

    <button id="btn" data-i18n="crop.btn" onclick="recommend()">🌾 फसल सुझाव</button>
  </div>

  <div id="result"></div>
</div>

<script src="crop.js"></script>
<script src="feature-shell.js"></script>
</body>
</html>
