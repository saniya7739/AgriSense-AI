<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Pickup</title>
    <link rel="stylesheet" href="RequestPickup.css">
</head>
<body>
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn" id="backBtn">Back</a>
        <select id="lang" class="lang-selector" onchange="changeLang()">
            <option value="hi">हिन्दी</option>
            <option value="en">English</option>
            <option value="bh">भोजपुरी</option>
            <option value="mr">मराठी</option>
            <option value="pa">ਪੰਜਾਬੀ</option>
        </select>
    </div>

    <h1 id="pageTitle">Crop Pickup Request</h1>

    <div class="form-container">
        <input type="text" id="farmerName" placeholder="Farmer Name">
        <input type="text" id="cropName" placeholder="Crop Name">
        <input type="number" id="quantity" min="0.01" step="0.01" placeholder="Quantity">

        <select id="quantityUnit">
            <option value="">Select Unit</option>
            <option value="kg">KG</option>
            <option value="gr">GR</option>
        </select>

        <input type="text" id="state" placeholder="State">
        <input type="text" id="village" placeholder="Village">
        <input type="text" id="pincode" inputmode="numeric" maxlength="6" placeholder="Pincode (6 digits)">
        <input type="text" id="phone" placeholder="Phone Number">

        <button id="submitBtn" onclick="submitPickup()">Submit Request</button>
        <p id="message"></p>
    </div>

    <script src="RequestPickup.js"></script>
</body>
</html>
