<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AgriSense AI – Disease Detection</title>
<link rel="stylesheet" href="disease.css">
</head>

<body>
<div class="overlay"></div>

<!-- Back Button -->
<a href="dashboard.html" class="back-btn" id="backBtn">← Back</a>

<!-- LANGUAGE SELECTOR -->
<div class="lang-selector">
  <select id="lang" onchange="changeLang()">
    <option value="hi">🇮🇳 हिंदी</option>
    <option value="en">🇬🇧 English</option>
    <option value="bh">🗣️ Bhojpuri</option>
    <option value="mr">🇮🇳 Marathi</option>
    <option value="pa">🇮🇳 ਪੰਜਾਬੀ</option>
  </select>
</div>

<div class="container">

  <h1 id="title">📷 फसल रोग पहचान</h1>
  <p id="subtitle">फसल की फोटो अपलोड करें या कैमरा से क्लिक करें</p>

  <div class="card">

    <label id="uploadText">📁 फोटो अपलोड करें</label>
    <input type="file" id="upload" accept="image/*">

    <label id="cameraText">📸 कैमरा से फोटो लें</label>
    <input type="file" id="camera" accept="image/*" capture="environment">

    <button id="detectBtn" onclick="detectDisease()">🔍 रोग पहचानें</button>

  </div>

  <div id="result"></div>

</div>

<script src="disease.js"></script>
</body>
</html>
