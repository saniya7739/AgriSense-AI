<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Community</title>
    <link rel="stylesheet" href="FarmerCommunity.css">
</head>
<body>
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn" id="backBtn">Back</a>
        <select id="lang" class="lang-selector" onchange="changeLang()">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="bh">Bhojpuri</option>
            <option value="mr">Marathi</option>
            <option value="pa">Punjabi</option>
        </select>
    </div>

    <h1 id="pageTitle">Farmer Community Q&A</h1>

    <div class="ask-section">
        <textarea id="questionInput" placeholder="Write your question here..."></textarea>
        <button id="postBtn" onclick="postQuestion()">Post Question</button>
    </div>

    <hr>
    <div id="questionList"></div>

    <script src="FarmerCommunity.js"></script>
</body>
</html>
