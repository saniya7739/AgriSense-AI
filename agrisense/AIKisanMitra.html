<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Kisan Mitra</title>
  <link rel="stylesheet" href="AIKisanMitra.css">
</head>
<body>
  <div class="overlay"></div>

  <div class="lang-selector">
    <select id="lang" onchange="changeLang()">
      <option value="hi">🇮🇳 हिंदी</option>
      <option value="en">🇬🇧 English</option>
      <option value="bh">🗣️ Bhojpuri</option>
      <option value="mr">🇮🇳 Marathi</option>
      <option value="pa">🇮🇳 ਪੰਜਾਬੀ</option>
    </select>
  </div>

  <a href="dashboard.html" class="back-btn" id="backBtn">← Back</a>

  <div class="container">
    <h1 id="heading">🧑‍🌾 एआई किसान मित्र</h1>
    <p id="sub">अपने सवालों का जवाब पाएं</p>

    <div class="card">
      <label id="catL">🎯 विषय चुनें</label>
      <select id="category" onchange="updateQuestions()">
        <option value="">-- Select Topic --</option>
      </select>

      <label id="qL">❓ प्रश्न चुनें</label>
      <select id="question"></select>
      <button id="btn" type="button" onclick="getAnswer()" class="submit-btn">💡 उत्तर प्राप्त करें</button>

      <label id="askL">💬 अपना सवाल पूछें</label>
      <textarea id="userQuestion" rows="4" placeholder="Type your farming question"></textarea>

      <div class="action-row">
        <button id="micBtn" type="button" class="aux-btn" onclick="startListening()">🎤 Speak</button>
        <button id="askBtn" type="button" class="submit-btn" onclick="askAssistant()">🤖 Ask Kisan Sahayak</button>
        <button id="speakBtn" type="button" class="aux-btn" onclick="speakAnswer()">🔊 Listen</button>
      </div>

      <div id="answerBox" class="answer-box hidden">
        <h3 id="ansTitle"></h3>
        <p id="ansText"></p>
      </div>
    </div>
  </div>

  <script src="AIKisanMitra.js"></script>
</body>
</html>
