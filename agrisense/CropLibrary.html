<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Library</title>
<script src="theme.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
body { background: url("crop-bg.jpg") no-repeat center center fixed; background-size: cover; color: #1b5e20; }
.overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: -1; }
.top-bar { max-width: 1100px; margin: 16px auto 0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
.back-btn { text-decoration: none; background: #2e7d32; color: #fff; padding: 10px 14px; border-radius: 10px; font-weight: 700; }
.lang-selector { padding: 10px 12px; border-radius: 10px; border: 2px solid #2e7d32; background: #e8d8b0; font-weight: 700; }
header { max-width: 1100px; margin: 14px auto 0; padding: 0 16px; }
header h1 { text-align: center; color: #f1f8e9; text-shadow: 0 3px 8px rgba(0,0,0,0.5); font-size: 38px; }
.search-box { max-width: 1100px; margin: 16px auto 0; padding: 0 16px; }
.search-box input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #2e7d32; background: #e8d8b0; font-size: 16px; }
.container { max-width: 1100px; margin: 0 auto; padding: 18px 16px 24px; }
.crop-list { display: flex; flex-wrap: wrap; gap: 14px; }
.crop-card { background: #e8d8b0; color: #2b2b2b; border-radius: 14px; padding: 14px 18px; cursor: pointer; font-weight: 700; transition: transform .2s ease, box-shadow .2s ease; }
.crop-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.22); }
.crop-details { margin-top: 18px; border-radius: 16px; background: rgba(232, 216, 176, 0.95); padding: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); color: #2b2b2b; }
.crop-details h2 { color: #1b5e20; margin-bottom: 8px; }
.crop-details p { margin: 6px 0; }
@media (max-width: 640px) {
  header h1 { font-size: 28px; }
}
</style>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="feature-shell.css">
</head>
<body>
<div class="overlay"></div>

<div class="top-bar">
  <a href="dashboard.html" class="back-btn" id="backBtn">Back</a>
  </div>

<header>
  <h1 id="pageTitle">Smart Crop Library</h1>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search crop...">
</div>

<div class="container">
  <div class="crop-list" id="cropList"></div>
  <div class="crop-details" id="cropDetails">
    <h2 id="defaultDetailsTitle">Select a crop</h2>
  </div>
</div>

<script>
const UI_TEXT = {
  hi: { title: "Smart Crop Library", search: "Fasal khojen...", select: "Fasal chunen", back: "Wapas", labels: ["Season","Soil","Sowing","Irrigation","Fertilizer","Pests","Treatment"] },
  en: { title: "Smart Crop Library", search: "Search crop...", select: "Select a crop", back: "Back", labels: ["Season","Soil","Sowing","Irrigation","Fertilizer","Pests","Treatment"] },
  bh: { title: "Smart Crop Library", search: "Fasal khoji...", select: "Fasal chuni", back: "Lautin", labels: ["Season","Soil","Sowing","Irrigation","Fertilizer","Pests","Treatment"] },
  mr: { title: "Smart Crop Library", search: "Pik shodha...", select: "Pik nivada", back: "Parat", labels: ["Season","Soil","Sowing","Irrigation","Fertilizer","Pests","Treatment"] },
  pa: { title: "Smart Crop Library", search: "Fasal khojo...", select: "Fasal chuno", back: "Wapas", labels: ["Season","Soil","Sowing","Irrigation","Fertilizer","Pests","Treatment"] }
};

const CROPS = {
  Wheat: { season: "Rabi", soil: "Loamy", sowing: "Nov-Dec", irrigation: "4-5 times", fertilizer: "NPK 120:60:40", pests: "Aphids", treatment: "Neem spray" },
  Rice: { season: "Kharif", soil: "Clayey", sowing: "Jun-Jul", irrigation: "High water", fertilizer: "NPK 100:50:50", pests: "Stem borer", treatment: "Recommended insecticide" },
  Maize: { season: "Kharif", soil: "Loamy", sowing: "Jun-Jul", irrigation: "3-4 times", fertilizer: "NPK 120:60:40", pests: "Fall armyworm", treatment: "Spinosad spray" },
  Cotton: { season: "Kharif", soil: "Black", sowing: "May-Jun", irrigation: "6-7 times", fertilizer: "NPK 80:40:40", pests: "Bollworm", treatment: "Integrated pest control" },
  Potato: { season: "Rabi", soil: "Sandy loam", sowing: "Oct-Nov", irrigation: "6-8 times", fertilizer: "NPK 150:80:100", pests: "Tuber moth", treatment: "Mancozeb + field hygiene" },
  Tomato: { season: "All season", soil: "Well-drained", sowing: "Jul-Aug", irrigation: "Weekly", fertilizer: "NPK 100:50:50", pests: "Whitefly", treatment: "Neem oil + yellow traps" },
  Mustard: { season: "Rabi", soil: "Alluvial", sowing: "Oct", irrigation: "2-3 times", fertilizer: "NPK 80:40:40", pests: "Aphids", treatment: "Targeted spray" }
};

const cropList = document.getElementById("cropList");
const cropDetails = document.getElementById("cropDetails");
const searchInput = document.getElementById("searchInput");
const langEl = document.getElementById("lang");

function getLang() {
  return localStorage.getItem('selectedLanguage') || 'hi';
}

function changeLang() {
  const t = UI_TEXT[getLang()];
  document.getElementById("pageTitle").innerText = t.title;
  document.getElementById("backBtn").innerText = t.back;
  document.getElementById("searchInput").placeholder = t.search;
  const defaultTitle = document.getElementById("defaultDetailsTitle");
  if (defaultTitle) defaultTitle.innerText = t.select;
}

// Listen for language change event
window.addEventListener('languageChanged', function(event) {
    changeLang();
});

function renderCropList(filter = "") {
  const q = filter.toLowerCase();
  cropList.innerHTML = "";
  Object.keys(CROPS).forEach((name) => {
    if (name.toLowerCase().includes(q)) {
      const card = document.createElement("div");
      card.className = "crop-card";
      card.innerText = name;
      card.onclick = () => showCrop(name);
      cropList.appendChild(card);
    }
  });
}

function showCrop(name) {
  const t = UI_TEXT[getLang()];
  const c = CROPS[name];
  cropDetails.innerHTML = `
    <h2>${name}</h2>
    <p><b>${t.labels[0]}:</b> ${c.season}</p>
    <p><b>${t.labels[1]}:</b> ${c.soil}</p>
    <p><b>${t.labels[2]}:</b> ${c.sowing}</p>
    <p><b>${t.labels[3]}:</b> ${c.irrigation}</p>
    <p><b>${t.labels[4]}:</b> ${c.fertilizer}</p>
    <p><b>${t.labels[5]}:</b> ${c.pests}</p>
    <p><b>${t.labels[6]}:</b> ${c.treatment}</p>
  `;
}

searchInput.addEventListener("keyup", () => renderCropList(searchInput.value));
changeLang();
renderCropList();
</script>
<script src="feature-shell.js"></script>
</body>
</html>
